<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Better Card</title>
</head>

<div id="buttons"></div>
<div id="modal-bg">
    <div id="modal">
    </div>
</div>

<style>
    * {
        font-family: sans-serif;
        font-weight: 100;
        box-sizing: border-box;
    }

    #buttons {
        display: flex;
        flex-direction: column;
        flex-wrap: wrap;
        justify-content: center;
        gap: 20px;
        height: 100vh;
        width: 100vw;
        align-items: center;
        padding: 20px;
    }

    button {
        padding: 30px;
        border: 0 none;
        border-radius: 5px;
        background-color: white;
        font-size: 70px;
        width: 100%;
    }

    #modal-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;

        display: flex;
        justify-content: center;
        align-items: center;

        background-color: rgba(0, 0, 0, 0.5);
        visibility: hidden;
    }

    #modal {
        padding: 40px;
        border-radius: 5px;
        background-color: white;
        text-align: center;
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    #modal h1 {
        font-size: 70px;
        margin: 0;
        color: gold;
        font-weight: bold;
    }

    #modal h2 {
        font-size: 50px;
        margin: 0;
        color: #888;
    }
</style>

<script type="text/javascript">
    amex = {
        restaurants: 4,
        groceries: 4,
        flights: 3,
        "*": 1
    }

    apple = {
        applePay: 2,
        apple: 3,
        "*": 1
    }

    discover = {
        applePay: 5,
        gas: 5,
        "*": 1
    }

    chaseFlex = {
        flights: 5,
        restaurants: 3,
        drugstores: 3,
        lyft: 5,
        gas: 5,
        entertainment: 5
    }

    const CARDS = {
        "Amex Gold": amex,
        "Apple Card": apple,
        "Discover It": discover,
        "Chase Freedom Flex": chaseFlex
    }

    let categories = []
    for (const card of Object.values(CARDS)) {
        categories = categories.concat(Object.keys(card));
    }
    categories = [...new Set(categories)];

    function findBestCard(category) {
        let bestCard = null;
        let bestValue = 0;
        for (const key of Object.keys(CARDS)) {
            const card = CARDS[key];
            if (card[category] > bestValue) {
                bestCard = key;
                bestValue = card[category];
            }
        }
        return bestCard;
    }

    function normalize(category) {
        return category.replace(/([A-Z])/g, " $1").replace(/^./, str => str.toUpperCase());
    }

    function getColor() {
        return `hsla(${~~(360 * Math.random())}, 70%,  72%, 0.8)`
    }

    for (const category of categories) {
        if (category === "*") {
            continue;
        }

        const bestCard = findBestCard(category);
        const button = document.createElement("button");
        button.style.backgroundColor = getColor();
        button.innerText = normalize(category);
        button.onclick = () => {
            const modal = document.getElementById("modal");
            modal.innerHTML = `
                <h2>The best card for ${normalize(category)} is</h1>
                <h1>${bestCard}</h2>
            `;
            document.getElementById("modal-bg").style.visibility = "visible";
        }
        document.getElementById("buttons").appendChild(button);
    }

    document.getElementById("modal-bg").onclick = () => {
        document.getElementById("modal-bg").style.visibility = "hidden";
    }
</script>

</html>
