<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Better Card</title>
</head>

<div id="buttons"></div>

<style>
    #buttons {
        display: flex;
        flex-direction: column;
        flex-wrap: wrap;
        justify-content: center;
    }

    button {
        margin: 10px;
        padding: 10px;
        border: 0 none;
        border-radius: 5px;
        background-color: white;
        font-size: 20px;
    }
</style>

<script type="text/javascript">
    amex = {
        restaurants: 4,
        groceries: 4,
        flights: 3,
        "*": 1
    }

    apple = {
        applePay: 2,
        apple: 3,
        "*": 1
    }

    discover = {
        applePay: 5,
        "*": 1
    }

    const CARDS = {
        "Amex Gold": amex,
        "Apple Card": apple,
        "Discover It": discover
    }

    let categories = []
    for (const card of Object.values(CARDS)) {
        categories = categories.concat(Object.keys(card));
    }
    categories = [...new Set(categories)];

    function findBestCard(category) {
        let bestCard = null;
        let bestValue = 0;
        for (const key of Object.keys(CARDS)) {
            const card = CARDS[key];
            if (card[category] > bestValue) {
                bestCard = key;
                bestValue = card[category];
            }
        }
        return bestCard;
    }

    function normalize(category) {
        return category.replace(/([A-Z])/g, " $1").replace(/^./, str => str.toUpperCase());
    }

    function getColor() {
        return `hsla(${~~(360 * Math.random())}, 70%,  72%, 0.8)`
    }

    for (const category of categories) {
        if (category === "*") {
            continue;
        }

        const bestCard = findBestCard(category);
        const button = document.createElement("button");
        button.style.backgroundColor = getColor();
        button.innerText = normalize(category);
        button.onclick = () => {
            alert(bestCard);
        }
        document.getElementById("buttons").appendChild(button);
    }
</script>

</html>
